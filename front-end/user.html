<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Commerce - User List</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
      <h1 class="text-2xl font-bold mb-6 text-gray-800 text-center">
        daftar users:D
      </h1>

      <table class="min-w-full bg-white border border-gray-200">
        <thead>
          <tr class="bg-gray-800 text-white text-left text-sm uppercase">
            <th class="py-3 px-4 border-b">ID</th>
            <th class="py-3 px-4 border-b">Username</th>
            <th class="py-3 px-4 border-b">Nama Lengkap</th>
            <th class="py-3 px-4 border-b">Role</th>
            <th class="py-3 px-4 border-b">Status</th>
          </tr>
        </thead>
        <tbody id="user-table-body" class="text-gray-700 text-sm"></tbody>
      </table>
    </div>

    <script>
      console.log('tuwes');
      async function UsersData() {
        try {
          console.log('woi');
          const respon = await fetch('http://localhost/api/users');
          const output = await respon.json();
          console.log('hai');
          if (output.status === 'success') {
            const table = document.getElementById('user-table-body');
            table.innerHTML = '';

            output.data.forEach((user) => {
              const row = `
                    <tr class="hover:bg-gray-50 border-b border-gray-200">
                        <td class="py-3 px-4">${user.ID}</td>
                        <td class="py-3 px-4 font-semibold">${
                          user.USERNAME
                        }</td>
                        <td class="py-3 px-4">${user.NAMA_LENGKAP}</td>
                        <td class="py-3 px-4">
                            <span class="px-2 py-1 rounded text-xs font-bold
                                ${
                                  user.ROLE === 'ADMIN'
                                    ? 'bg-red-100 text-red-800'
                                    : user.ROLE === 'PENJUAL'
                                    ? 'bg-blue-100 text-blue-800'
                                    : 'bg-green-100 text-blue-800'
                                }">
                                ${user.ROLE}
                            </span>
                        </td>
                        <td class="py-3 px-4">${
                          user.STATUS === '1' ? 'Aktif' : 'Nonaktif'
                        }</td>
                    </tr>
                
                `;
              table.innerHTML += row;
            });

            status.innerText = 'gagal:(';
          }
        } catch (e) {
          status.innerText = 'error:(' + e;
        }
      }

      UsersData();
    </script>
  </body>
</html>
