<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="./assets/js/basicCheck.js"></script>
    <style>
      body {
        background-color: #f4f4f4;
        /* background-color: white; */
        font-family: Arial, sans-serif;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <form id="form-data">
      <br>
      <label>username atau email</label>
      <input type="text" id="username" name="username" required>
      <br>
      <br>
      <label>password</label>
      <input type="password" id="password" name="password" required>
      <input type="submit">
    </form>
    <div id="notif"></div>

    <script>
      document.getElementById('form-data').onsubmit = async (event) => {

            event.preventDefault();
            const notif = document.getElementById("notif");
            const form_data = new FormData(event.target);
            
            const dataJson = Object.fromEntries(form_data.entries());

            try {

                const respon = await fetch('http://localhost/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dataJson)
                });

                const data = await respon.json();
                if (data.status === 'success') {
                  alert('berhasil:'+ data.token);
                    localStorage.setItem('smlvl',data.role)
                    localStorage.setItem('token_sigma',data.token)

                    window.location.reload();
                    // if (data.role === 'PENJUAL') {
                    //     window.location.href = 'penjual/penjual.php';
                    // } else if (data.role === 'PEMBELI') {
                    //     window.location.href = 'pembeli/pembeli.php'
                    // } else if (data.role === "ADMIN") {
                    //     window.location.href = 'atmin/admin.php'
                    // } else {
                    //     notif.innerText = "role tidak dikenali!";
                    // }
                } else {

                    notif.innerText = data.message;
                }


            } catch (error) {
                notif.innerText = "error" + error.message;
            }

        }
    </script>
  </body>
</html>
